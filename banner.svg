<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#1a1f35"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#3DD6F5"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#6C63FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3DD6F5;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bg)" rx="12"/>

  <!-- Decorative circles left -->
  <circle cx="80" cy="110" r="70" fill="none" stroke="#6C63FF" stroke-width="1" opacity="0.15"/>
  <circle cx="80" cy="110" r="45" fill="none" stroke="#6C63FF" stroke-width="1" opacity="0.1"/>
  <circle cx="80" cy="110" r="20" fill="#6C63FF" opacity="0.05"/>

  <!-- Decorative circles right -->
  <circle cx="1120" cy="110" r="70" fill="none" stroke="#3DD6F5" stroke-width="1" opacity="0.15"/>
  <circle cx="1120" cy="110" r="45" fill="none" stroke="#3DD6F5" stroke-width="1" opacity="0.1"/>
  <circle cx="1120" cy="110" r="20" fill="#3DD6F5" opacity="0.05"/>

  <!-- Dot grid decoration -->
  <g opacity="0.07" fill="#6C63FF">
    <circle cx="200" cy="30" r="2"/><circle cx="220" cy="30" r="2"/><circle cx="240" cy="30" r="2"/>
    <circle cx="200" cy="50" r="2"/><circle cx="220" cy="50" r="2"/><circle cx="240" cy="50" r="2"/>
    <circle cx="200" cy="70" r="2"/><circle cx="220" cy="70" r="2"/><circle cx="240" cy="70" r="2"/>
    <circle cx="960" cy="150" r="2"/><circle cx="980" cy="150" r="2"/><circle cx="1000" cy="150" r="2"/>
    <circle cx="960" cy="170" r="2"/><circle cx="980" cy="170" r="2"/><circle cx="1000" cy="170" r="2"/>
    <circle cx="960" cy="190" r="2"/><circle cx="980" cy="190" r="2"/><circle cx="1000" cy="190" r="2"/>
  </g>

  <!-- Name -->
  <text
    x="600" y="105"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="52"
    font-weight="700"
    fill="url(#nameGrad)"
    text-anchor="middle"
    filter="url(#glow)"
    letter-spacing="1">Manuel Torres Miranda</text>

  <!-- Subtitle -->
  <text
    x="600" y="148"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="22"
    fill="#8b949e"
    text-anchor="middle"
    letter-spacing="3">BACKEND  &amp;  ANDROID  DEVELOPER</text>

  <!-- Decorative line -->
  <rect x="340" y="165" width="520" height="2" fill="url(#lineGrad)" rx="1"/>
</svg>
